        title: ARIA Role Example
  - name: Authoring Tool Accessibility Guidelines (ATAG) 2.0
    description: >-
      ATAG 2.0 is a W3C Recommendation that defines standards for making
      authoring tools (CMSes, code editors, web-based tools) accessible to
      authors with disabilities, and for helping those tools generate accessible
      content.
    humanURL: https://www.w3.org/WAI/standards-guidelines/atag/
    baseURL: https://www.w3.org/TR/ATAG/
    tags:
      - ATAG
      - Authoring Tools
      - W3C
    properties:
      - type: Documentation
        url: https://www.w3.org/WAI/standards-guidelines/atag/
      - type: Specification
        url: https://www.w3.org/TR/ATAG/
  - name: User Agent Accessibility Guidelines (UAAG) 2.0
    description: >-
      UAAG 2.0 is a W3C standard for browsers, browser extensions, media
      players, and other user agents that render web content. It defines how
      user agents should make web content accessible to users with disabilities
      either directly or in conjunction with assistive technologies.
    humanURL: https://www.w3.org/WAI/standards-guidelines/uaag/
    baseURL: https://www.w3.org/TR/UAAG20/
    tags:
      - UAAG
      - Browsers
      - User Agents
      - W3C
    properties:
      - type: Documentation
        url: https://www.w3.org/WAI/standards-guidelines/uaag/
      - type: Specification
        url: https://www.w3.org/TR/UAAG20/
  - name: Section 508
    description: >-
      Section 508 of the Rehabilitation Act requires U.S. federal agencies to
      ensure their information and communication technology (ICT) is accessible
      to people with disabilities. The Revised 508 Standards (effective January
      18, 2017) incorporate WCAG 2.0 Level A and AA success criteria for web
      and electronic content across seven chapters of requirements.
    humanURL: https://www.access-board.gov/ict/
    baseURL: https://www.section508.gov/
    tags:
      - Section 508
      - Federal
      - Government
      - US Law
      - ICT
    properties:
      - type: Documentation
        url: https://www.access-board.gov/ict/
      - type: Documentation
        url: https://www.section508.gov/develop/web-content/
        title: Section 508 Web Content Development Guidance
  - name: Accessibility Conformance Testing (ACT) Rules Format 1.1
    description: >-
      ACT Rules Format 1.1 (W3C Recommendation, February 2026) establishes a
      standardized format for documenting accessibility conformance testing
      rules. The framework supports automated, semi-automated, and manual
      testing and is used to create transparent, interoperable accessibility
      testing methodologies aligned with WCAG.
    humanURL: https://www.w3.org/WAI/standards-guidelines/act/
    baseURL: https://www.w3.org/TR/act-rules-format/
    tags:
      - ACT
      - Testing
      - Conformance
      - W3C
    properties:
      - type: Documentation
        url: https://www.w3.org/WAI/standards-guidelines/act/
      - type: Specification
        url: https://www.w3.org/TR/act-rules-format/
      - type: GitHubRepository
        url: https://github.com/w3c/wcag-act-rules
        title: WCAG ACT Rules Repository
