  - type: Features
    data:
      - name: Perceivable Content
        description: >-
          Standards requiring that information and user interface components be
          presentable to users in ways they can perceive, including text
          alternatives for non-text content.
      - name: Operable Interface
        description: >-
          Standards ensuring that user interface components and navigation are
          operable, including keyboard accessibility and sufficient time limits.
      - name: Understandable Information
        description: >-
          Standards ensuring that information and the operation of the user
          interface is understandable, including readable text and predictable
          navigation.
      - name: Robust Technology
        description: >-
          Standards requiring that content be robust enough to be reliably
          interpreted by a wide variety of user agents, including assistive
          technologies.
      - name: Conformance Levels
        description: >-
          Three-tiered conformance model (Level A, AA, AAA) providing graduated
          accessibility requirements for organizations to target.
      - name: Automated Testing Rules
        description: >-
          ACT Rules Framework providing standardized, machine-readable rules for
          automated accessibility conformance testing.
  - type: UseCases
    data:
      - name: Web Application Accessibility Auditing
        description: >-
          Using WCAG 2.2 success criteria and ACT rules to audit web
          applications for accessibility compliance.
      - name: Federal Government ICT Procurement
        description: >-
          Applying Section 508 standards when procuring or developing
          information and communication technology for U.S. federal agencies.
      - name: Accessible Rich Internet Application Development
        description: >-
          Using WAI-ARIA attributes to make dynamic JavaScript-driven
          interfaces accessible to screen readers and assistive technologies.
      - name: Automated CI/CD Accessibility Testing
        description: >-
          Integrating axe-core or Pa11y into continuous integration pipelines
          to catch accessibility regressions automatically.
      - name: Regulatory Compliance Documentation
        description: >-
          Producing Voluntary Product Accessibility Templates (VPATs) and
          Accessibility Conformance Reports aligned with Section 508 and WCAG.
  - type: Integrations
    data:
      - name: axe-core
        description: >-
          Open-source accessibility testing engine by Deque Systems implementing
          WCAG 2.0/2.1/2.2 rules, integrates with browsers, testing frameworks,
          and CI tools.
      - name: Pa11y
        description: >-
          Open-source Node.js tool for automated accessibility testing against
          WCAG standards, integrates with GitHub Actions and CI/CD pipelines.
      - name: Section508.gov
        description: >-
          GSA's Government-wide IT Accessibility Program providing guidance,
          training, and resources for federal Section 508 compliance.
      - name: EU Accessibility Act / EN 301 549
        description: >-
          European standard referencing WCAG 2.1 AA, applicable to public and
          private sector digital services in EU member states.
      - name: ISO/IEC 40500:2025
        description: >-
          International Standards Organization adoption of WCAG 2.2, enabling
          global regulatory alignment with the W3C standard.
