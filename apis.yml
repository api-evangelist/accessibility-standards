apis:
  - name: Web Content Accessibility Guidelines (WCAG) 2.2
    description: >-
      The current stable web accessibility standard published by the W3C
      Accessibility Guidelines Working Group (AG WG). WCAG 2.2 comprises 13
      guidelines organized under four principles (perceivable, operable,
      understandable, robust) with success criteria at three levels: A, AA, and
      AAA. It has been adopted as ISO/IEC 40500:2025 and is referenced by
      Section 508 and the EU Accessibility Act.
    humanURL: https://www.w3.org/WAI/standards-guidelines/wcag/
    baseURL: https://www.w3.org/TR/WCAG22/
    tags:
      - WCAG
      - Web Content
      - Accessibility
      - W3C
      - ISO
    properties:
      - type: Documentation
        url: https://www.w3.org/WAI/standards-guidelines/wcag/
