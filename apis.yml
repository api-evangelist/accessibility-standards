  - name: WAI-ARIA 1.2
    description: >-
      Accessible Rich Internet Applications (WAI-ARIA) 1.2 is a W3C
      Recommendation (June 2023) that defines semantic attributes enabling
      assistive technologies to interpret dynamic web content and complex
      interfaces. The suite includes Core Accessibility API Mappings, Accessible
      Name and Description Computation, and HTML/SVG API Mappings.
    humanURL: https://www.w3.org/WAI/standards-guidelines/aria/
    baseURL: https://www.w3.org/TR/wai-aria-1.2/
    tags:
      - ARIA
      - Semantic
      - Screen Reader
      - W3C
    properties:
      - type: Documentation
        url: https://www.w3.org/WAI/standards-guidelines/aria/
      - type: Specification
        url: https://www.w3.org/TR/wai-aria-1.2/
      - type: Documentation
        url: https://www.w3.org/WAI/ARIA/apg/
        title: ARIA Authoring Practices Guide
      - type: JSONSchema
        url: >-
          https://raw.githubusercontent.com/api-evangelist/accessibility-standards/refs/heads/main/json-schema/aria-role-schema.json
        title: ARIA Role Schema
